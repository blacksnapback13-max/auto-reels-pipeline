<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f5f4ef">
  <title>Авто сборка рилсов</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f4ef;
      --text: #202124;
      --muted: #686b70;
      --panel: #ffffff;
      --line: #d8d4ca;
      --accent: #126c5f;
      --accent-2: #ba4a31;
      --ok: #1f7a4d;
      --warn: #9a6a00;
      --bad: #b33131;
      --shadow: 0 18px 50px rgba(32, 33, 36, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      overflow-x: hidden;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      padding: 0 0 20px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 680px;
      overflow-wrap: anywhere;
    }

    .status-pill {
      min-width: 180px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      padding: 10px 12px;
      color: var(--muted);
      font-size: 14px;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 22px;
      margin-top: 24px;
      align-items: start;
    }

    section {
      min-width: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel h2 {
      margin: 0;
      padding: 18px 18px 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    form {
      padding: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 13px;
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
      font-size: 16px;
    }

    input:focus,
    select:focus {
      outline: 2px solid rgba(18, 108, 95, 0.2);
      border-color: var(--accent);
    }

    .field {
      margin-bottom: 16px;
    }

    .source-toggle {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px;
      margin-bottom: 16px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f0eee8;
    }

    .source-toggle label {
      position: relative;
      margin: 0;
      min-width: 0;
      cursor: pointer;
    }

    .source-toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .source-toggle span {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border-radius: 6px;
      color: var(--muted);
      font-weight: 800;
      font-size: 14px;
      text-align: center;
    }

    .source-toggle input:checked + span {
      background: #fff;
      color: var(--accent);
      box-shadow: 0 4px 16px rgba(32, 33, 36, 0.08);
    }

    input[type="file"] {
      padding: 9px;
    }

    .is-hidden {
      display: none;
    }

    .upload-progress {
      margin: 0;
      padding: 22px;
      color: var(--muted);
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .switch {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .switch input {
      width: 18px;
      min-height: 18px;
      accent-color: var(--accent);
    }

    button {
      width: 100%;
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin: 12px 0 0;
    }

    .job-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .job-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .job-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .job-side {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      flex: 0 0 auto;
    }

    .badge {
      flex: 0 0 auto;
      height: fit-content;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      background: #f0eee8;
      color: var(--muted);
    }

    .badge.running,
    .badge.queued,
    .badge.waiting_local_worker,
    .badge.local_worker_running,
    .badge.local_worker_uploading {
      background: #fff1cf;
      color: var(--warn);
    }

    .badge.done {
      background: #dff3e8;
      color: var(--ok);
    }

    .badge.failed {
      background: #f8dddd;
      color: var(--bad);
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      background: var(--line);
      border-bottom: 1px solid var(--line);
    }

    .step {
      background: #fbfaf7;
      padding: 14px;
      min-height: 78px;
    }

    .step-name {
      font-weight: 800;
      font-size: 13px;
    }

    .step-state {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }

    .outputs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
      padding: 18px;
    }

    .output {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    video {
      display: block;
      width: 100%;
      aspect-ratio: 9 / 16;
      background: #101010;
    }

    .output-body {
      padding: 12px;
    }

    .output-title {
      margin: 0;
      font-weight: 800;
    }

    .output-copy {
      color: var(--muted);
      font-size: 13px;
      margin: 6px 0 0;
      overflow-wrap: anywhere;
    }

    .output-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .file-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      border: 1px solid rgba(18, 108, 95, 0.24);
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--accent);
      background: #f3faf7;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .file-link:hover {
      border-color: rgba(18, 108, 95, 0.55);
    }

    .job-download-button,
    .action-button {
      width: auto;
      min-height: 32px;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    .job-download-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(18, 108, 95, 0.24);
      color: #fff;
      background: var(--accent);
    }

    .action-button {
      border: 1px solid rgba(186, 74, 49, 0.28);
      color: var(--accent-2);
      background: #fff8f4;
    }

    .description-text {
      width: 100%;
      min-height: 142px;
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      resize: vertical;
      color: var(--text);
      background: #fffdf9;
      font: inherit;
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .cover-button {
      width: 100%;
      margin-top: 10px;
      border-color: rgba(18, 108, 95, 0.24);
      color: #fff;
      background: var(--accent);
    }

    .cover-settings {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf9;
    }

    .cover-settings summary {
      cursor: pointer;
      padding: 10px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }

    .cover-setting-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 0 10px 10px;
    }

    .cover-setting-grid label {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .cover-setting-grid select {
      min-height: 38px;
      margin-top: 5px;
      padding: 8px 10px;
      font-size: 13px;
    }

    .cover-reference-toggle {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
    }

    .cover-reference-toggle input {
      width: 18px;
      min-height: 18px;
      accent-color: var(--accent);
    }

    .cover-preview {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fbfaf7;
    }

    .cover-preview img {
      display: block;
      width: 100%;
      aspect-ratio: 9 / 16;
      object-fit: cover;
      background: #171717;
    }

    .cover-preview-body {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px;
    }

    .cover-preview-links {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      flex: 0 0 auto;
    }

    .cover-status {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .cover-status.error {
      color: var(--bad);
    }

    .progress-panel {
      margin: 18px;
      padding: 14px;
      border: 1px solid rgba(18, 108, 95, 0.2);
      border-radius: 8px;
      background: #f6fbf8;
    }

    .progress-panel.done {
      border-color: rgba(31, 122, 77, 0.24);
      background: #f3fbf6;
    }

    .progress-panel.failed {
      border-color: rgba(179, 49, 49, 0.3);
      background: #fff7f7;
    }

    .progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      font-size: 14px;
    }

    .progress-bar {
      height: 9px;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(18, 108, 95, 0.14);
    }

    .progress-fill {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: var(--accent);
      transition: width 180ms ease;
    }

    .progress-eta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .progress-eta strong {
      display: block;
      color: var(--text);
      font-size: 14px;
    }

    .empty {
      padding: 34px 18px;
      color: var(--muted);
      text-align: center;
    }

    .error {
      margin: 0 18px 18px;
      border: 1px solid rgba(179, 49, 49, 0.35);
      border-radius: 8px;
      color: var(--bad);
      background: #fff4f4;
      padding: 12px;
      overflow-wrap: anywhere;
    }

    @media (max-width: 860px) {
      header,
      .layout,
      .job-header {
        display: block;
      }

      .job-side {
        margin-top: 12px;
        flex-wrap: wrap;
      }

      .status-pill {
        margin-top: 14px;
        text-align: left;
        width: 100%;
      }

      .layout {
        gap: 0;
      }

      .panel {
        margin-bottom: 18px;
      }

      .steps {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      main {
        width: 100%;
        padding: 14px 10px 28px;
      }

      .grid,
      .steps,
      .cover-setting-grid {
        grid-template-columns: 1fr;
      }

      header {
        padding-bottom: 14px;
      }

      h1 {
        font-size: 32px;
      }

      .subtitle {
        font-size: 14px;
      }

      .layout {
        margin-top: 14px;
      }

      .panel {
        border-radius: 8px;
        box-shadow: 0 12px 30px rgba(32, 33, 36, 0.07);
      }

      .panel h2,
      form,
      .job-header,
      .outputs {
        padding-left: 14px;
        padding-right: 14px;
      }

      form {
        padding-bottom: 14px;
      }

      input,
      select,
      button {
        min-height: 48px;
      }

      .switch input,
      .cover-reference-toggle input {
        min-height: 22px;
        width: 22px;
      }

      .job-title {
        font-size: 18px;
      }

      .job-side {
        align-items: stretch;
      }

      .job-download-button,
      .badge,
      .file-link,
      .action-button {
        width: 100%;
        min-height: 42px;
        white-space: normal;
        text-align: center;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .step {
        min-height: 62px;
        padding: 12px 14px;
      }

      .outputs {
        gap: 12px;
        padding-top: 14px;
        padding-bottom: 14px;
      }

      .output-actions,
      .cover-preview-links {
        display: grid;
        grid-template-columns: 1fr;
        width: 100%;
      }

      .cover-preview-body {
        display: grid;
        grid-template-columns: 1fr;
      }

      .description-text {
        min-height: 120px;
        font-size: 14px;
      }

      .progress-panel {
        margin: 14px;
        padding: 12px;
      }

      .progress-eta {
        grid-template-columns: 1fr;
      }

      .empty {
        padding: 28px 14px;
      }

      .error {
        margin: 0 14px 14px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Авто сборка рилсов</h1>
        <p class="subtitle">Онлайн-пайплайн: видео или YouTube ссылка на входе, вертикальные MP4-фрагменты на выходе.</p>
      </div>
      <div class="status-pill" id="toolStatus">Проверяю инструменты...</div>
    </header>

    <div class="layout">
      <section class="panel">
        <h2>Новая сборка</h2>
        <form id="jobForm">
          <div class="source-toggle" role="radiogroup" aria-label="Источник видео">
            <label>
              <input name="sourceMode" type="radio" value="upload" checked>
              <span>Видео с носителя</span>
            </label>
            <label>
              <input name="sourceMode" type="radio" value="youtube">
              <span>YouTube</span>
            </label>
          </div>

          <div class="field" data-source-field="upload">
            <label for="videoFile">Файл проповеди</label>
            <input id="videoFile" name="videoFile" type="file" accept="video/mp4,video/quicktime,video/webm,video/x-m4v,.mp4,.mov,.m4v,.webm,.mkv" required>
          </div>

          <div class="field is-hidden" data-source-field="youtube">
            <label for="url">YouTube ссылка</label>
            <input id="url" name="url" type="url" placeholder="https://www.youtube.com/watch?v=...">
          </div>

          <div class="grid">
            <div class="field">
              <label for="count">Рилсов</label>
              <select id="count" name="count">
                <option value="3">3</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
              </select>
            </div>
            <div class="field">
              <label for="language">Субтитры</label>
              <select id="language" name="language">
                <option value="auto">Авто: RU/UK/PL/TR/EN</option>
                <option value="ru">Русский</option>
                <option value="uk">Украинский</option>
                <option value="pl">Polski</option>
                <option value="tr">Türkçe</option>
                <option value="en">English</option>
              </select>
            </div>
          </div>

          <div class="grid">
            <div class="field">
              <label for="minDuration">Минимум, сек</label>
              <input id="minDuration" name="minDuration" type="number" min="15" max="90" value="28">
            </div>
            <div class="field">
              <label for="maxDuration">Максимум, сек</label>
              <input id="maxDuration" name="maxDuration" type="number" min="20" max="120" value="55">
            </div>
          </div>

          <label class="switch">
            <input id="subtitles" name="subtitles" type="checkbox" checked>
            Добавлять субтитры
          </label>

          <div class="field">
            <label for="cropMode">Формат видео</label>
            <select id="cropMode" name="cropMode">
              <option value="fit-blur" selected>Как офлайн: видео целиком + фон</option>
              <option value="crop">На весь экран</option>
            </select>
          </div>

          <button id="submitButton" type="submit">Собрать рилсы</button>
          <p class="hint">Для постоянных MP4 и обложек в online-режиме нужен Cloudinary.</p>
        </form>
      </section>

      <section class="panel" id="jobPanel">
        <div class="empty">Задач пока нет.</div>
      </section>
    </div>
  </main>

  <script>
    const form = document.querySelector("#jobForm");
    const submitButton = document.querySelector("#submitButton");
    const sourceRadios = [...document.querySelectorAll("input[name='sourceMode']")];
    const sourceFields = [...document.querySelectorAll("[data-source-field]")];
    const urlInput = document.querySelector("#url");
    const videoInput = document.querySelector("#videoFile");
    const jobPanel = document.querySelector("#jobPanel");
    const toolStatus = document.querySelector("#toolStatus");
    const API_BASE = location.protocol === "file:" ? "http://127.0.0.1:3232" : "";
    const API_TARGET = API_BASE || location.origin;
    const generatedDescriptions = new Map();
    const coverStates = new Map();
    const coverSettings = new Map();
    const DEFAULT_COVER_SETTINGS = {
      frameReference: true,
      style: "cutout",
      motion: "dynamic",
      palette: "warm",
      textZone: "top"
    };
    let currentJob = null;
    let activeJobId = null;
    let pollTimer = null;

    sourceRadios.forEach((radio) => radio.addEventListener("change", syncSourceMode));
    syncSourceMode();

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      submitButton.disabled = true;
      const payload = Object.fromEntries(new FormData(form).entries());
      payload.subtitles = document.querySelector("#subtitles").checked;

      try {
        const data = await createJob(payload);
        activeJobId = data.job.id;
        renderJob(data.job);
        startPolling();
      } catch (error) {
        jobPanel.innerHTML = `<p class="error">${escapeHtml(errorMessage(error))}</p>`;
      } finally {
        submitButton.disabled = false;
      }
    });

    function syncSourceMode() {
      const mode = sourceRadios.find((radio) => radio.checked)?.value || "upload";
      sourceFields.forEach((field) => {
        const active = field.dataset.sourceField === mode;
        field.classList.toggle("is-hidden", !active);
      });
      urlInput.required = mode === "youtube";
      videoInput.required = mode === "upload";
    }

    async function createJob(payload) {
      if (payload.sourceMode === "youtube") {
        const response = await fetch(`${API_BASE}/api/jobs`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Не удалось создать задачу");
        return data;
      }

      const file = videoInput.files?.[0];
      if (!file) throw new Error("Выберите видеофайл");
      const params = new URLSearchParams({
        filename: file.name,
        count: payload.count || "3",
        language: payload.language || "auto",
        minDuration: payload.minDuration || "28",
        maxDuration: payload.maxDuration || "55",
        cropMode: payload.cropMode || "fit-blur",
        subtitles: payload.subtitles ? "true" : "false"
      });
      return uploadVideoJob(`${API_BASE}/api/jobs/upload?${params.toString()}`, file);
    }

    function uploadVideoJob(url, file) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("POST", url);
        xhr.responseType = "json";
        xhr.setRequestHeader("content-type", file.type || "application/octet-stream");
        xhr.upload.onprogress = (event) => {
          const percent = event.lengthComputable ? Math.round((event.loaded / event.total) * 100) : 0;
          jobPanel.innerHTML = renderUploadProgress(percent);
        };
        xhr.onload = () => {
          const data = xhr.response || {};
          if (xhr.status < 200 || xhr.status >= 300) {
            reject(new Error(data.error || "Не удалось загрузить видео"));
            return;
          }
          resolve(data);
        };
        xhr.onerror = () => reject(new Error("Не удалось загрузить видео"));
        xhr.send(file);
      });
    }

    jobPanel.addEventListener("click", async (event) => {
      const coverButton = event.target.closest("[data-cover-index]");
      if (coverButton && currentJob) {
        await generateCover(Number(coverButton.dataset.coverIndex));
        return;
      }

      const button = event.target.closest("[data-description-index]");
      if (!button || !currentJob) return;
      const index = Number(button.dataset.descriptionIndex);
      const output = currentJob.outputs?.[index];
      if (!output) return;
      generatedDescriptions.set(descriptionKey(currentJob.id, index), generateReelDescription(output));
      renderJob(currentJob);
    });

    jobPanel.addEventListener("change", (event) => {
      const control = event.target.closest("[data-cover-setting]");
      if (!control || !currentJob) return;
      const index = Number(control.dataset.coverSettingIndex);
      const key = descriptionKey(currentJob.id, index);
      const name = control.dataset.coverSetting;
      const value = control.type === "checkbox" ? control.checked : control.value;
      coverSettings.set(key, {
        ...getCoverSettings(key),
        [name]: value
      });
    });

    async function generateCover(index) {
      const output = currentJob?.outputs?.[index];
      if (!output) return;

      const key = descriptionKey(currentJob.id, index);
      const description = generatedDescriptions.get(key) || output.description || generateReelDescription(output);
      if (!description) {
        coverStates.set(key, { loading: false, error: "Не удалось собрать описание для обложки." });
        renderJob(currentJob);
        return;
      }

      coverStates.set(key, { loading: true, error: "" });
      renderJob(currentJob);

      try {
        const response = await fetch(`${API_BASE}/api/jobs/${encodeURIComponent(currentJob.id)}/outputs/${index}/cover`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            description,
            settings: getCoverSettings(key)
          })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Не удалось сгенерировать обложку");
        coverStates.set(key, { loading: false, error: "" });
        if (data.job) renderJob(data.job);
      } catch (error) {
        coverStates.set(key, { loading: false, error: errorMessage(error) });
        renderJob(currentJob);
      }
    }

    async function loadConfig() {
      try {
        const response = await fetch(`${API_BASE}/api/config`);
        const data = await response.json();
        const coreOk = ["yt-dlp", "ffmpeg", "ffprobe"].every((name) => data.tools?.[name]?.ok);
        const captions = data.tools?.captionRenderer?.ok;
        const subtitles = data.tools?.ffmpeg?.filters?.subtitles;
        const storage = data.storage?.provider === "cloudinary" && data.storage?.ok ? " · Cloudinary" : "";
        const asr = data.asr?.provider === "cloudflare" && data.asr?.configured ? " · ASR" : "";
        const youtubeCookies = data.youtube?.cookies?.configured ? " · YouTube cookies" : "";
        if (!coreOk) {
          toolStatus.textContent = "Нужно проверить инструменты";
        } else if (captions) {
          toolStatus.textContent = `yt-dlp, ffmpeg готовы · trendy captions${storage}${asr}${youtubeCookies}`;
        } else if (!subtitles) {
          toolStatus.textContent = `yt-dlp, ffmpeg готовы · без burned subtitles${storage}${asr}${youtubeCookies}`;
        } else {
          toolStatus.textContent = `yt-dlp, ffmpeg готовы${storage}${asr}${youtubeCookies}`;
        }
        toolStatus.title = "";
      } catch (error) {
        toolStatus.textContent = "Сервер недоступен";
        toolStatus.title = errorMessage(error);
      }
    }

    async function loadLatest() {
      try {
        const response = await fetch(`${API_BASE}/api/jobs/latest`);
        const data = await response.json();
        if (data.job) {
          activeJobId = data.job.id;
          renderJob(data.job);
          if (isActiveStatus(data.job.status)) startPolling();
        }
      } catch (error) {
        jobPanel.innerHTML = `<p class="error">${escapeHtml(errorMessage(error))}</p>`;
      }
    }

    function startPolling() {
      clearInterval(pollTimer);
      pollTimer = setInterval(refreshJob, 1800);
      refreshJob();
    }

    async function refreshJob() {
      if (!activeJobId) return;
      const response = await fetch(`${API_BASE}/api/jobs/${activeJobId}`);
      const data = await response.json();
      if (data.job) {
        renderJob(data.job);
        if (!isActiveStatus(data.job.status)) {
          clearInterval(pollTimer);
        }
      }
    }

    function errorMessage(error) {
      const message = String(error?.message || "Не удалось выполнить запрос");
      if (message === "Failed to fetch" || error?.name === "TypeError") {
        return `Не удалось подключиться к серверу ${API_TARGET}. Запустите в папке проекта: npm run dev`;
      }
      return message;
    }

    function renderJob(job) {
      currentJob = job;
      const title = job.metadata?.title || "Готовлю задачу";
      const uploader = job.metadata?.uploader ? ` · ${job.metadata.uploader}` : "";
      const duration = job.source?.duration ? ` · ${Math.round(job.source.duration)} сек` : "";
      const outputs = job.outputs || [];
      const downloadHref = `${API_BASE}/api/jobs/${encodeURIComponent(job.id)}/download-all`;
      const downloadAll = outputs.length
        ? `<a class="job-download-button" href="${escapeHtml(downloadHref)}" download>Скачать все MP4</a>`
        : "";

      jobPanel.innerHTML = `
        <div class="job-header">
          <div>
            <h2 class="job-title">${escapeHtml(title)}</h2>
            <div class="job-meta">${escapeHtml(job.id)}${escapeHtml(uploader)}${duration}</div>
          </div>
          <div class="job-side">
            ${downloadAll}
            <div class="badge ${job.status}">${statusLabel(job.status)}</div>
          </div>
        </div>
        <div class="steps">
          ${(job.steps || []).map(renderStep).join("")}
        </div>
        ${renderJobProgress(job)}
        ${job.error ? `<p class="error">${escapeHtml(job.error)}</p>` : ""}
        ${outputs.length ? `<div class="outputs">${outputs.map((output, index) => renderOutput(output, index, job.id)).join("")}</div>` : `<div class="empty">Выходные видео появятся после рендера.</div>`}
      `;
    }

    function renderUploadProgress(percent) {
      const value = Math.max(0, Math.min(100, Number(percent) || 0));
      return `
        <div class="progress-panel">
          <div class="progress-row">
            <strong>Загружаю видео</strong>
            <span>${Math.round(value)}%</span>
          </div>
          <div class="progress-bar">
            <span class="progress-fill" style="width: ${value.toFixed(1)}%"></span>
          </div>
          <div class="progress-eta">
            <span><strong>${value ? "меньше минуты" : "рассчитываю"}</strong>до начала обработки</span>
            <span><strong>Файл отправляется на сервер</strong>текущий этап</span>
          </div>
        </div>
      `;
    }

    function renderStep(step) {
      return `
        <div class="step">
          <div class="step-name">${escapeHtml(step.label)}</div>
          <div class="step-state">${stepState(step.status)}</div>
        </div>
      `;
    }

    function renderJobProgress(job) {
      const progress = job.progress || deriveProgress(job);
      if (!progress) return "";
      const percent = Math.max(0, Math.min(100, Number(progress.percent) || 0));
      const rounded = Math.round(percent);
      const panelState = job.status === "done" ? "done" : (job.status === "failed" ? "failed" : "");
      const eta = job.status === "done"
        ? "готово"
        : (job.status === "failed" ? "остановлено" : (progress.etaText || formatEta(progress.etaSeconds)));
      const etaCaption = isActiveStatus(job.status) ? "до готовности" : "статус";
      const detail = progress.detail || renderProgressDetail(job.renderProgress) || "Готовлю задачу";
      return `
        <div class="progress-panel ${panelState}">
          <div class="progress-row">
            <strong>${escapeHtml(progress.label || "Прогресс")}</strong>
            <span>${rounded}%</span>
          </div>
          <div class="progress-bar">
            <span class="progress-fill" style="width: ${percent.toFixed(1)}%"></span>
          </div>
          <div class="progress-eta">
            <span><strong>${escapeHtml(eta)}</strong>${escapeHtml(etaCaption)}</span>
            <span><strong>${escapeHtml(detail)}</strong>текущий этап</span>
          </div>
        </div>
      `;
    }

    function deriveProgress(job) {
      if (job.status === "done") {
        return { percent: 100, etaSeconds: 0, etaText: "готово", label: "Рилсы готовы", detail: `${job.outputs?.length || 0} MP4 готово` };
      }
      if (job.status === "failed") {
        return { percent: 0, etaSeconds: null, etaText: "", label: "Остановлено с ошибкой", detail: "Нужно перезапустить задачу" };
      }
      const render = job.renderProgress;
      if (render) {
        return {
          percent: Number(render.overallPercent ?? render.percent) || 0,
          etaSeconds: render.overallEtaSeconds ?? render.etaSeconds ?? null,
          etaText: "",
          label: "Рендерю вертикальные рилсы",
          detail: renderProgressDetail(render)
        };
      }
      return { percent: 8, etaSeconds: null, etaText: "рассчитываю", label: "Готовлю задачу", detail: "" };
    }

    function renderProgressDetail(progress) {
      if (!progress) return "";
      const timing = progress.duration
        ? `${progress.outTime || "0:00"} / ${progress.duration}`
        : (progress.outTime || "");
      return [
        progress.file,
        progress.reel && progress.total ? `Reel ${progress.reel} из ${progress.total}` : "",
        timing,
        progress.speed
      ].filter(Boolean).join(" · ");
    }

    function formatEta(seconds) {
      const value = Number(seconds);
      if (!Number.isFinite(value)) return "рассчитываю";
      if (value <= 0) return "готово";
      if (value < 45) return "меньше минуты";
      const minutes = Math.ceil(value / 60);
      if (minutes < 60) return `примерно ${minutes} мин`;
      const hours = Math.floor(minutes / 60);
      const rest = minutes % 60;
      return rest ? `примерно ${hours} ч ${rest} мин` : `примерно ${hours} ч`;
    }

    function getCoverSettings(key) {
      return {
        ...DEFAULT_COVER_SETTINGS,
        ...(coverSettings.get(key) || {})
      };
    }

    function renderCoverSettings(index, settings) {
      return `
        <details class="cover-settings">
          <summary>Настройки обложки</summary>
          <div class="cover-setting-grid">
            ${renderCoverSelect(index, "style", "Макет", settings.style, [
              ["cutout", "Герой-стикер"],
              ["poster", "Постер"],
              ["magazine", "Журнал"],
              ["split", "Split"],
              ["headline", "Большой заголовок"]
            ])}
            ${renderCoverSelect(index, "motion", "Герой", settings.motion, [
              ["dynamic", "Крупнее"],
              ["calm", "Спокойно"],
              ["closeup", "Максимум"],
              ["breakthrough", "Диагональ"]
            ])}
            ${renderCoverSelect(index, "palette", "Фон", settings.palette, [
              ["warm", "Теплый"],
              ["contrast", "Темный контраст"],
              ["clean", "Светлый чистый"],
              ["shadow-light", "Тень + свет"]
            ])}
            ${renderCoverSelect(index, "textZone", "Текст", settings.textZone, [
              ["top", "Сверху"],
              ["center", "По центру"],
              ["bottom", "Снизу"],
              ["none", "Без зоны"]
            ])}
            <label class="cover-reference-toggle">
              <input type="checkbox" data-cover-setting-index="${index}" data-cover-setting="frameReference" ${settings.frameReference ? "checked" : ""}>
              Кадр из рилса как основа
            </label>
          </div>
        </details>
      `;
    }

    function renderCoverSelect(index, name, label, value, options) {
      const optionHtml = options.map(([optionValue, optionLabel]) => (
        `<option value="${escapeHtml(optionValue)}" ${optionValue === value ? "selected" : ""}>${escapeHtml(optionLabel)}</option>`
      )).join("");
      return `
        <label>
          ${escapeHtml(label)}
          <select data-cover-setting-index="${index}" data-cover-setting="${escapeHtml(name)}">
            ${optionHtml}
          </select>
        </label>
      `;
    }

    function renderOutput(output, index, jobId) {
      const time = `${formatClock(output.start)}-${formatClock(output.end)} · ${Math.round(output.duration)} сек`;
      const text = output.text ? `<p class="output-copy">${escapeHtml(output.text)}</p>` : "";
      const videoSrc = output.file?.startsWith("/jobs/") ? `${API_BASE}${output.file}` : output.file;
      const href = videoSrc || "#";
      const key = descriptionKey(jobId, index);
      const description = generatedDescriptions.get(key) || output.description || "";
      const settings = getCoverSettings(key);
      const coverState = coverStates.get(key) || {};
      const cover = output.cover;
      const coverSrc = versionedJobAssetUrl(cover?.file, cover?.generatedAt);
      const referenceSrc = versionedJobAssetUrl(cover?.referenceFrame, cover?.generatedAt);
      const coverStatus = coverState.loading
        ? `<p class="cover-status">Генерирую обложку 9:16 по описанию и кадру из рилса...</p>`
        : (coverState.error ? `<p class="cover-status error">${escapeHtml(coverState.error)}</p>` : "");
      const coverBlock = coverSrc ? `
        <div class="cover-preview">
          <img src="${escapeHtml(coverSrc)}" alt="Обложка ${escapeHtml(output.label)}" loading="lazy">
          <div class="cover-preview-body">
            <span class="output-copy">${escapeHtml(cover.provider || "AI")} · ${escapeHtml(cover.size || "9:16")} · ${escapeHtml(cover.model || "AI")}</span>
            <div class="cover-preview-links">
              ${referenceSrc ? `<a class="file-link" href="${escapeHtml(referenceSrc)}" target="_blank" rel="noreferrer">Кадр</a>` : ""}
              <a class="file-link" href="${escapeHtml(coverSrc)}" target="_blank" rel="noreferrer">PNG</a>
            </div>
          </div>
        </div>
      ` : "";
      return `
        <article class="output">
          <video src="${escapeHtml(videoSrc)}" controls preload="metadata"></video>
          <div class="output-body">
            <p class="output-title">${escapeHtml(output.label)}</p>
            <p class="output-copy">${time}</p>
            ${text}
            <div class="output-actions">
              <a class="file-link" href="${escapeHtml(href)}" target="_blank" rel="noreferrer">Открыть MP4</a>
              <button class="action-button" type="button" data-description-index="${index}">
                ${description ? "Обновить описание" : "Сгенерировать описание"}
              </button>
            </div>
            ${description ? `
              <textarea class="description-text" readonly>${escapeHtml(description)}</textarea>
              ${renderCoverSettings(index, settings)}
              <button class="action-button cover-button" type="button" data-cover-index="${index}" ${coverState.loading ? "disabled" : ""}>
                ${coverState.loading ? "Генерирую обложку..." : (cover ? "Сгенерировать новую обложку" : "Сгенерировать обложку")}
              </button>
              ${coverStatus}
              ${coverBlock}
            ` : ""}
          </div>
        </article>
      `;
    }

    function descriptionKey(jobId, index) {
      return `${jobId}:${index}`;
    }

    function versionedJobAssetUrl(file, version) {
      if (!file) return "";
      const url = file.startsWith("/jobs/") ? `${API_BASE}${file}` : file;
      if (!version || !url.startsWith(`${API_BASE}/jobs/`)) return url;
      const separator = url.includes("?") ? "&" : "?";
      return `${url}${separator}v=${encodeURIComponent(version)}`;
    }

    function generateReelDescription(output) {
      const text = normalizeDescriptionText(output.text || "");
      const language = detectTextLanguage(text, output.language || "auto");
      if (language !== "ru") return generateLocalizedReelDescription(text, language);
      const hook = buildClickbaitHook(text);
      const body = buildDescriptionBody(text);
      const cta = buildDescriptionCta(text);
      const hashtags = buildHashtags(text);
      return [
        hook,
        body,
        cta,
        hashtags
      ].filter(Boolean).join("\n\n");
    }

    function detectTextLanguage(text, preferred = "auto") {
      const requested = normalizeLanguage(preferred);
      if (requested !== "auto") return requested;
      const value = String(text || "");
      const lower = value.toLocaleLowerCase("und");
      if (/[іїєґ]/iu.test(value) || /\b(що|якщо|цей|ця|для|віра|бог|господь|життя)\b/iu.test(lower)) return "uk";
      if (/[ąćęłńóśźż]/iu.test(value) || /\b(żeby|który|która|jest|nie|dla|życie|wiara|bóg)\b/iu.test(lower)) return "pl";
      if (/[çğıİöşü]/u.test(value) || /\b(bir|için|değil|ama|çünkü|hayat|iman|tanrı)\b/iu.test(lower)) return "tr";
      if (/[a-z]/iu.test(value) && !/[а-яёіїєґ]/iu.test(value)) return "en";
      return "ru";
    }

    function normalizeLanguage(value) {
      return ["auto", "ru", "uk", "en", "pl", "tr"].includes(value) ? value : "auto";
    }

    function generateLocalizedReelDescription(text, language) {
      const body = trimDescriptionWithLocale(text, 220, language);
      const templates = {
        uk: {
          hook: "Ці слова спочатку звучать просто. А потім влучають прямо в серце.",
          body: body || "Короткий фрагмент з думкою, яку хочеться дослухати до кінця.",
          cta: "Додивись до кінця і збережи, якщо відгукнулося.",
          hashtags: "#віра #мотивація #історія #рілс"
        },
        pl: {
          hook: "Te słowa najpierw brzmią prosto. Potem trafiają dokładnie tam, gdzie trzeba.",
          body: body || "Krótki fragment z myślą, którą warto obejrzeć do końca.",
          cta: "Obejrzyj do końca i zapisz, jeśli poruszyło.",
          hashtags: "#wiara #motywacja #historia #reels"
        },
        tr: {
          hook: "Bu sözler önce basit geliyor. Sonra tam kalbine dokunuyor.",
          body: body || "Sonuna kadar izlemeye değer kısa ve güçlü bir bölüm.",
          cta: "Sonuna kadar izle ve sana dokunduysa kaydet.",
          hashtags: "#iman #motivasyon #hikaye #reels"
        },
        en: {
          hook: "These words sound simple at first. Then they land exactly where they need to.",
          body: body || "A short moment with a thought worth watching to the end.",
          cta: "Watch until the end and save it if it speaks to you.",
          hashtags: "#faith #motivation #story #reels"
        }
      };
      const template = templates[language] || templates.en;
      return [template.hook, template.body, template.cta, template.hashtags].filter(Boolean).join("\n\n");
    }

    function normalizeDescriptionText(value) {
      return String(value || "")
        .replace(/\.\.\./g, " ")
        .replace(/[“”„"]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function buildClickbaitHook(text) {
      const lower = text.toLocaleLowerCase("ru-RU");
      if (/убега|беж|бег|устал|втор(ое|ом) дых|сил/.test(lower)) {
        return "Вы можете бежать всю жизнь и так и не понять, от чего на самом деле спасаетесь.";
      }
      if (/страх|тревог|злюсь|разруш|боль|не так/.test(lower)) {
        return "Возможно, проблема не там, где вы привыкли ее искать.";
      }
      if (/мама|семь|сест|дет/.test(lower)) {
        return "Он хотел просто увидеть маму. Но дальше начинается самое сильное.";
      }
      if (/бог|господ|вер|псалом|молит|чуд|бож/.test(lower)) {
        return "Иногда Бог отвечает не так, как мы ожидали.";
      }
      return "Эти слова сначала звучат просто. А потом попадают прямо в точку.";
    }

    function buildDescriptionBody(text) {
      const lower = text.toLocaleLowerCase("ru-RU");
      if (/убега|беж|бег|устал|втор(ое|ом) дых|сил/.test(lower)) {
        return "Этот фрагмент про момент, когда усталость становится сигналом: пора остановиться, честно посмотреть внутрь и понять, ради чего ты продолжаешь путь.";
      }
      if (/страх|тревог|злюсь|разруш|боль|не так/.test(lower)) {
        return "Здесь очень точно показано, как старые раны влияют на наши решения, реакции и веру в то, что хорошее вообще возможно.";
      }
      if (/мама|семь|сест|дет/.test(lower)) {
        return "Короткая история о любви, ожидании и словах, которые нельзя обрывать на самом важном месте.";
      }
      if (/бог|господ|вер|псалом|молит|чуд|бож/.test(lower)) {
        return "Сильная мысль о вере, Божьей помощи и моменте, когда нужно не сдаться, а дослушать до конца.";
      }
      return trimDescription(text, 220);
    }

    function buildDescriptionCta(text) {
      const lower = text.toLocaleLowerCase("ru-RU");
      if (/убега|беж|бег|устал|втор(ое|ом) дых|сил/.test(lower)) {
        return "Досмотри до конца — финальная мысль может оказаться именно про тебя.";
      }
      if (/бог|господ|вер|псалом|молит|чуд|бож/.test(lower)) {
        return "Сохрани, если сейчас нужен знак продолжать.";
      }
      return "Досмотри до конца и сохрани, если зацепило.";
    }

    function trimDescription(text, maxLength) {
      if (!text) return "";
      if (text.length <= maxLength) return capitalize(text);
      const slice = text.slice(0, maxLength);
      const boundary = Math.max(slice.lastIndexOf("."), slice.lastIndexOf("!"), slice.lastIndexOf("?"));
      if (boundary > 120) return capitalize(slice.slice(0, boundary + 1));
      return `${capitalize(slice.replace(/\s+\S*$/, ""))}...`;
    }

    function trimDescriptionWithLocale(text, maxLength, language) {
      if (!text) return "";
      const locale = languageLocale(language);
      if (text.length <= maxLength) return capitalizeLocale(text, locale);
      const slice = text.slice(0, maxLength);
      const boundary = Math.max(slice.lastIndexOf("."), slice.lastIndexOf("!"), slice.lastIndexOf("?"));
      if (boundary > 120) return capitalizeLocale(slice.slice(0, boundary + 1), locale);
      return `${capitalizeLocale(slice.replace(/\s+\S*$/, ""), locale)}...`;
    }

    function languageLocale(language) {
      return {
        uk: "uk-UA",
        pl: "pl-PL",
        tr: "tr-TR",
        en: "en-US",
        ru: "ru-RU"
      }[language] || "ru-RU";
    }

    function buildHashtags(text) {
      const lower = text.toLocaleLowerCase("ru-RU");
      const tags = [];
      if (/бог|господ|вер|псалом|молит|бож/.test(lower)) tags.push("#вера", "#бог");
      if (/убега|беж|бег|устал|втор(ое|ом) дых|сил/.test(lower)) tags.push("#несдавайся");
      if (/страх|тревог|злюсь|разруш|боль/.test(lower)) tags.push("#психология");
      if (/мама|семь|сест|дет/.test(lower)) tags.push("#семья");
      tags.push("#мотивация", "#история", "#рилс");
      return [...new Set(tags)].slice(0, 5).join(" ");
    }

    function capitalize(value) {
      const text = String(value || "").trim();
      return capitalizeLocale(text, "ru-RU");
    }

    function capitalizeLocale(value, locale) {
      const text = String(value || "").trim();
      return text ? text[0].toLocaleUpperCase(locale) + text.slice(1) : "";
    }

    function statusLabel(status) {
      return {
        queued: "В очереди",
        running: "Работает",
        waiting_local_worker: "Ждёт Mac",
        local_worker_running: "Mac работает",
        local_worker_uploading: "Mac грузит",
        done: "Готово",
        failed: "Ошибка"
      }[status] || status;
    }

    function isActiveStatus(status) {
      return ["queued", "running", "waiting_local_worker", "local_worker_running", "local_worker_uploading"].includes(status);
    }

    function stepState(status) {
      return {
        pending: "ожидает",
        running: "в процессе",
        done: "готово",
        failed: "ошибка"
      }[status] || status;
    }

    function formatClock(seconds) {
      const value = Math.max(0, Number(seconds) || 0);
      const min = Math.floor(value / 60);
      const sec = String(Math.floor(value % 60)).padStart(2, "0");
      return `${min}:${sec}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    loadConfig();
    loadLatest();
  </script>
</body>
</html>

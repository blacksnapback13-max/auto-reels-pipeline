services:
  - type: web
    name: auto-reels-shtunda13
    runtime: docker
    plan: free
    region: frankfurt
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: COVER_IMAGE_PROVIDER
        value: auto
      - key: AI_IMAGE_PROVIDER_ORDER
        value: gemini,cloudflare,huggingface,qwen,pollinations
      - key: POLLINATIONS_IMAGE_ENABLED
        value: "true"
      - key: STORAGE_PROVIDER
        value: auto
      - key: CLOUDINARY_FOLDER
        value: auto-reels
      - key: UPLOAD_VIDEO_LIMIT_MB
        value: "700"
      - key: REEL_WIDTH
        value: "720"
      - key: REEL_HEIGHT
        value: "1280"
      - key: REEL_BACKGROUND_MODE
        value: crop
      - key: REEL_VIDEO_PRESET
        value: ultrafast
      - key: REEL_VIDEO_CRF
        value: "24"
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: POLLINATIONS_API_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: YTDLP_COOKIES_BASE64
        sync: false
